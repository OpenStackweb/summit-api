# This file is used to run this project locally alongside openstackid without port conflicts.
services:
  otel-collector:
    ports: !override
      - "1889:1888"   # pprof extension
      - "8890:8888"   # Prometheus metrics exposed by the Collector
      - "8891:8889"   # Prometheus exporter metrics
      - "13134:13133" # health_check extension
      - "4319:4317"   # OTLP gRPC receiver
      - "4320:4318"   # OTLP http receiver
      - "55680:55679" # zpages extension

  elasticsearch:
    ports: !override
      - "9202:9200"
      - "9302:9300"
